<!DOCTYPE html>
<html lang="es" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO - Recuperar Contraseña</title>
    <link rel="icon" type="image/svg+xml" href="/media/Sushine-Logo.svg">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4ECDC4',
                        'primary-dark': '#39bfb2',
                        'primary-light': '#5DD5CC',
                        'nexo-gray': '#6B7280',
                        'nexo-light-gray': '#9CA3AF',
                        'nexo-bg': '#F3F4F6',
                        'error-red': '#EF4444',
                        'success-green': '#10B981',
                        'warning-yellow': '#F59E0B',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                    boxShadow: {
                        'nexo': '0 10px 25px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                    },
                }
            }
        }
    </script>

    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Estilos del login que mantendremos */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F3F4F6;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .auth-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            padding: 3rem 2.5rem;
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 600;
            color: #4ECDC4;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #E5E7EB;
            border-radius: 0.75rem;
            font-size: 1rem;
            color: #374151;
            background: white;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4ECDC4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        .form-group small {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #6B7280;
        }

        .error-message {
            color: #EF4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: none;
        }

        .auth-button {
            width: 100%;
            background: #4ECDC4;
            color: white;
            font-weight: 600;
            padding: 0.875rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .auth-button:hover {
            background: #39bfb2;
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -3px rgba(78, 205, 196, 0.3);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #6B7280;
        }

        .auth-footer a {
            color: #4ECDC4;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Notification styles */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .alert-error {
            background-color: #FEE2E2;
            color: #B91C1C;
            border-left: 4px solid #EF4444;
        }

        .alert-success {
            background-color: #D1FAE5;
            color: #065F46;
            border-left: 4px solid #10B981;
        }

        @media (max-width: 640px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }
            
            .auth-title {
                font-size: 1.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Recuperar Contraseña</h2>
            
            <!-- Django Messages -->
            {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                <div class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            
            <form id="forgotPasswordForm" method="POST" action="{% url 'auth:forgot_password' %}">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="id_email">Correo electrónico</label>
                    <input type="email" id="id_email" name="email" required placeholder="tu@email.com">
                    <div id="email-error" class="error-message" role="alert"></div>
                    <small>Ingresa el correo asociado a tu cuenta.</small>
                </div>
                
                <button type="submit" class="auth-button">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                    <span>Enviar Instrucciones</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <a href="{% url 'auth:login' %}">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const form = e.target;
        const formData = new FormData(form);
        const submitButton = form.querySelector('button[type="submit"]');
        const originalButtonText = submitButton.innerHTML;
        
        // Show loading state
        submitButton.disabled = true;
        submitButton.innerHTML = `
            <div class="loading-spinner"></div>
            <span>Enviando...</span>
        `;
        
        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Show success notification
                const notification = document.createElement('div');
                notification.className = 'alert alert-success';
                notification.textContent = data.message || 'Revisa tu correo para continuar.';
                form.prepend(notification);
                
                // Clear form
                form.reset();
                
                setTimeout(() => {
                    window.location.href = "{% url 'auth:login' %}";
                }, 3000);
            } else {
                // Clear previous errors
                document.querySelectorAll('.error-message').forEach(el => {
                    el.textContent = '';
                    el.style.display = 'none';
                });
                
                if (data.errors) {
                    // Show field errors
                    for (const field in data.errors) {
                        const errorElement = document.getElementById(`${field}-error`);
                        if (errorElement) {
                            errorElement.textContent = Array.isArray(data.errors[field])
                                ? data.errors[field][0]
                                : data.errors[field];
                            errorElement.style.display = 'block';
                        }
                    }
                } else if (data.message) {
                    // Show general error
                    const notification = document.createElement('div');
                    notification.className = 'alert alert-error';
                    notification.textContent = data.message;
                    form.prepend(notification);
                }
            }
        })
        .catch(error => {
            console.error('Error:', error);
            const notification = document.createElement('div');
            notification.className = 'alert alert-error';
            notification.textContent = 'Error al procesar la solicitud. Intenta nuevamente.';
            form.prepend(notification);
        })
        .finally(() => {
            submitButton.disabled = false;
            submitButton.innerHTML = originalButtonText;
        });
    });
    </script>
</body>
</html>

<header class="bg-green-600 text-white shadow-md">
<div class="container mx-auto px-4 py-6">
    <h1 class="text-3xl font-bold text-center">NEXO</h1>
    <p class="text-center mt-2">Los mejores productos de cuero</p>

    
    {% if user.is_authenticated %}
    <p class="text-center mt-2">Has accedido con la cuenta de {{ user.username }}</p>

    {% else %}
    <p class="text-center mt-2">No has iniciado sesión</p>
    {% endif %}
    
</div>
</header>

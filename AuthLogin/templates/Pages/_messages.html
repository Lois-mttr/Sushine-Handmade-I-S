{% if messages %}
<div class="message-container">
    {% for message in messages %}
        <div class="alert-message error-message">
            <i class="fas fa-exclamation-circle"></i>
            <div>
                {{ message }}
                {% if blocked %}
                <div class="message-container" style="display: block;">
                    <p class="text-red-500 text-sm">
                        Demasiados intentos. Espera <span id="countdown">{{ remaining_time }}</span> segundos.
                    </p>
                </div>
                <script>
                    document.addEventListener('DOMContentLoaded', function() {
                        let countdownElement = document.getElementById('countdown');
                        let timeLeft = parseInt(countdownElement.textContent, 10);

                        if (!isNaN(timeLeft) && timeLeft > 0) {
                            let countdownInterval = setInterval(function() {
                                timeLeft--;
                                countdownElement.textContent = timeLeft;
                                if (timeLeft <= 0) {
                                    clearInterval(countdownInterval);
                                    // Aquí podrías recargar la página o habilitar nuevamente el formulario
                                    // window.location.reload();
                                }
                            }, 1000); // Actualizar cada segundo
                        }
                    });
                </script>
                {% endif %}
            </div>
        </div>
    {% endfor %}
</div>
{% endif %}

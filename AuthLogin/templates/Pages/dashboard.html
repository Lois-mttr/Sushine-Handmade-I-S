{% extends 'layouts/base.html' %}

{% block title %}Dashboard - Bienvenido{% endblock %}

{% block content %}
<div class="dashboard-container">
    <header class="dashboard-header">
        <h1>Bienvenido, {{ user.nombreUsuario }}</h1>
        <div class="user-actions">
            <a href="{% url 'logout' %}" class="logout-button">Cerrar Sesión</a>
        </div>
    </header>
    
    <main class="dashboard-content">
        <div class="dashboard-card">
            <h2>Panel de Control</h2>
            <p>Has iniciado sesión correctamente en el sistema.</p>
            <p>Rol: {{ user.rol|default:"No asignado" }}</p>
        </div>
    </main>
</div>
{% endblock %}

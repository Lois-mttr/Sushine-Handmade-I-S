{% extends "layouts/index.html" %}
{% load static %}

{% block title %}Login - NEXO{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/Index.css' %}">
<link rel="stylesheet" href="{% static 'css/login.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center relative overflow-hidden bg-[#eaeef3]">

  <!-- Background decorativo -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-20 -left-20 w-64 h-64 rounded-full bg-[#39bfb2]/20"></div>
    <div class="absolute top-1/4 -right-16 w-48 h-48 rounded-full bg-[#F29D35]/10"></div>
    <div class="absolute bottom-1/3 -left-10 w-32 h-32 rounded-full bg-[#F2CE16]/15"></div>
    <div class="absolute -bottom-20 right-1/4 w-56 h-56 rounded-full bg-[#F28627]/10"></div>

    <div class="absolute top-0 left-0 w-full h-full opacity-5">
      <div class="absolute top-0 left-1/4 w-1 h-full bg-[#39bfb2] transform rotate-12"></div>
      <div class="absolute top-0 left-1/2 w-1 h-full bg-[#F29D35] transform rotate-12"></div>
      <div class="absolute top-0 left-3/4 w-1 h-full bg-[#F2CE16] transform rotate-12"></div>
    </div>
  </div>

  <!-- Contenedor principal del login -->
  <div class="flex w-full max-w-3xl overflow-hidden rounded-lg bg-white shadow-lg z-10">

    <!-- Imagen (izquierda) -->
    <div class="hidden w-2/5 bg-gray-100 p-8 sm:block">
      <div class="flex h-full items-center justify-center">
        <img src="{% static 'images/Login.png' %}" alt="Decoración de login" class="object-cover w-full h-full" />
      </div>
    </div>

    <!-- Formulario (derecha) -->
    <div class="w-full p-8 sm:w-3/5">
      <h2 class="mb-8 text-2xl font-semibold text-teal-700">Iniciar Sesión</h2>
      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        
        <!-- Campo Usuario -->
        <div class="mb-6">
          <label for="username" class="mb-2 block text-sm font-medium text-gray-700">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            class="w-full rounded-md border border-gray-300 px-3 py-2 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
            required
          />
        </div>

      <!-- CAMPO DE CONTRASEÑA - VERSIÓN CORREGIDA -->
          <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
            
            <!-- Contenedor relativo para el input y el botón -->
            <div class="relative">
              <!-- Input de contraseña -->
              <input type="password" id="password" name="password"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-teal-500 pr-10"
                required
                oninput="toggleEyeIcon()">
              
              <!-- Botón para mostrar/ocultar contraseña (SOLO UNO) -->
              <button type="button" id="eye-toggle"
                      class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-teal-500 hidden"
                      onclick="togglePasswordVisibility()">
                <i id="eye-icon" class="fas fa-eye-slash text-sm"></i>
              </button>
            </div>
          <a href="#" class="text-sm text-teal-600 hover:underline mt-1 inline-block">¿Olvidaste la contraseña?</a>
        </div>

        <!-- Botones -->
        <div class="flex flex-col space-y-3 sm:flex-row sm:justify-between sm:space-x-3 sm:space-y-0">
          <a href="/" class="rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 text-center transition-colors hover:bg-gray-50">
            Cancelar
          </a>
          <button type="submit" class="rounded-md bg-teal-500 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-teal-600">
            Iniciar Sesión
          </button>
        </div>
      </form>
    </div>
  </div>
</main>

<!-- Scripts necesarios -->
{% block scripts %}
<!-- JavaScript para el control de contraseña -->
<script>
  /**
   * Muestra u oculta el ícono del ojo según si hay texto en el campo
   */
  function toggleEyeIcon() {
    const passwordInput = document.getElementById('password');
    const eyeToggle = document.getElementById('eye-toggle');
    
    // Muestra el ícono solo si hay texto en el campo
    if (passwordInput.value.length > 0) {
      eyeToggle.classList.remove('hidden');
    } else {
      eyeToggle.classList.add('hidden');
    }
  }

  /**
   * Alterna entre mostrar y ocultar la contraseña
   */
  function togglePasswordVisibility() {
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eye-icon');
    
    // Cambia el tipo de input y el ícono
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
    } else {
      passwordInput.type = 'password';
      eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
    }
  }

  /**
   * Limpia cualquier duplicado al cargar la página
   */
  document.addEventListener('DOMContentLoaded', function() {
    // Elimina controles nativos del navegador si existen
    const style = document.createElement('style');
    style.textContent = `
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear,
      input[type="password"]::-webkit-contacts-auto-fill-button,
      input[type="password"]::-webkit-credentials-auto-fill-button {
        display: none !important;
      }
    `;
    document.head.appendChild(style);
  });
</script>
{% endblock scripts %}
{% endblock %}

<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}{{ page_title|default:"Error - NEXO" }}{% endblock %}</title>
    
    <!-- Meta tags -->
    <meta name="description" content="Sistema de Inventario y Ventas NEXO - Página de Error">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4ECDC4',
                        'primary-dark': '#39bfb2',
                        secondary: '#eaeef3',
                        accent: '#f2ce16',
                        orange: '#f28627',
                        'orange-light': '#f29d35',
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    
    <style>
        .error-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        .error-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #e5e7eb;
        }
        
        .error-icon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 2rem;
            animation: pulse 2s infinite;
        }
        
        .error-404 { background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%); color: #dc2626; }
        .error-500 { background: linear-gradient(135deg, #fefbeb 0%, #fef3c7 100%); color: #d97706; }
        .error-403 { background: linear-gradient(135deg, #f0f9ff 0%, #dbeafe 100%); color: #2563eb; }
        .error-400 { background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); color: #7c3aed; }
        .error-csrf { background: linear-gradient(135deg, #fdf4ff 0%, #fae8ff 100%); color: #c026d3; }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .suggestion-item {
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            padding-left: 1rem;
        }
        
        .suggestion-item:hover {
            border-left-color: #39bfb2;
            background-color: #f8fafc;
            transform: translateX(4px);
        }
        
        .back-button {
            background: linear-gradient(135deg, #39bfb2 0%, #4ECDC4 100%);
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(57, 191, 178, 0.4);
        }
        
        .nexo-logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #39bfb2 0%, #4ECDC4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }
        
        .shape:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .shape:nth-child(2) { top: 20%; right: 10%; animation-delay: 2s; }
        .shape:nth-child(3) { bottom: 10%; left: 20%; animation-delay: 4s; }
        .shape:nth-child(4) { bottom: 20%; right: 20%; animation-delay: 1s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
    </style>
</head>
<body class="h-full">
    <div class="error-container relative">
        <!-- Formas flotantes decorativas -->
        <div class="floating-shapes">
            <div class="shape w-16 h-16 bg-primary rounded-full"></div>
            <div class="shape w-12 h-12 bg-accent rounded-lg"></div>
            <div class="shape w-20 h-20 bg-orange rounded-full"></div>
            <div class="shape w-8 h-8 bg-primary-dark rounded-lg"></div>
        </div>
        
        <div class="relative z-10 flex items-center justify-center min-h-screen p-4">
            <div class="error-card max-w-2xl w-full p-8 md:p-12">
                <!-- Header con logo -->
                <div class="text-center mb-8">
                    <div class="nexo-logo mb-2">NEXO</div>
                    <p class="text-gray-600">Sistema de Inventario y Ventas - Sunshine Handmade</p>
                </div>
                
                {% block error_content %}
                {% endblock %}
                
                <!-- Información del usuario (si está disponible) -->
                {% if user_info.name and user_info.name != 'Usuario' %}
                <div class="mt-8 pt-6 border-t border-gray-200">
                    <div class="flex items-center justify-center text-sm text-gray-600">
                        <i class="fas fa-user mr-2"></i>
                        <span>Sesión activa: {{ user_info.name }} ({{ user_info.role|title }})</span>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script>
        // Función para ir hacia atrás
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/dashboard/';
            }
        }
        
        // Función para ir al inicio
        function goHome() {
            window.location.href = '/dashboard/';
        }
        
        // Función para recargar la página
        function reloadPage() {
            window.location.reload();
        }
        
        // Animación de entrada
        document.addEventListener('DOMContentLoaded', function() {
            const card = document.querySelector('.error-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
        
        // Efecto de partículas (opcional)
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'absolute w-2 h-2 bg-primary rounded-full opacity-30';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = '100%';
            particle.style.animation = 'particleFloat 4s linear forwards';
            
            document.querySelector('.floating-shapes').appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 4000);
        }
        
        // Crear partículas cada 3 segundos
        setInterval(createParticle, 3000);
        
        // CSS para animación de partículas
        const style = document.createElement('style');
        style.textContent = `
            @keyframes particleFloat {
                to {
                    transform: translateY(-100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
